<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackston Online Store</title>
    <style>
        :root { --primary: #0a66c2; --secondary: #00c853; --accent: #ff7043; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f4f6f9; color: #333; }
        
        header { background: linear-gradient(135deg, var(--primary), #004d99); color: white; text-align: center; padding: 50px 20px; }
        .profile-container { margin-top: -40px; text-align: center; }
        .profile-pic { width: 150px; height: 150px; border-radius: 50%; border: 5px solid white; object-fit: cover; background: white; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .product-img { width: 100%; height: 200px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; }
        .price { font-size: 1.3em; font-weight: bold; color: var(--secondary); margin: 10px 0; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .order-form { background: #2c3e50; color: white; padding: 30px; border-radius: 12px; margin-top: 40px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; }
        .whatsapp-btn { background: #25d366; color: white; padding: 15px; width: 100%; border-radius: 6px; border: none; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Jackston Online Business</h1>
    <p>Authorized Distributor of Healthy Living Products</p>
</header>

<div class="profile-container">
    <img src="9714.jpg" alt="Jackston Oduor" class="profile-pic">
    <div style="background: var(--secondary); color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; margin-top: 10px; font-weight: bold;">Verified Distributor</div>
</div>

<div class="container">
    <div class="product-grid">
        <div class="card">
            <img src="7716.jpg" alt="Body Cream" class="product-img">
            <h3>Shea Butter Body Cream</h3>
            <div class="price">KES 700.00</div>
            <button class="btn" onclick="selectProduct('Body Cream', 700)">Select Product</button>
        </div>

        <div class="card">
            <img src="6576.jpg" alt="Sanitary Pads" class="product-img">
            <h3>Healthy Living Pads</h3>
            <div class="price">KES 300.00</div>
            <button class="btn" onclick="selectProduct('Sanitary Pads', 300)">Select Product</button>
        </div>

        <div class="card">
            <img src="7715.jpg" alt="Kojic Soap" class="product-img">
            <h3>Kojic & Honey Soap</h3>
            <div class="price">KES 300.00</div>
            <button class="btn" onclick="selectProduct('Kojic Soap', 300)">Select Product</button>
        </div>

        <div class="card">
            <img src="6566.jpg" alt="Lip Balm" class="product-img">
            <h3>Fresh Lips Lip Balm</h3>
            <div class="price">KES 250.00</div>
            <button class="btn" onclick="selectProduct('Lip Balm', 250)">Select Product</button>
        </div>
    </div>

    <div class="order-form" id="checkout">
        <h2>Place Your Order</h2>
        <input type="text" id="name" placeholder="Your Full Name">
        <input type="text" id="location" placeholder="Delivery Location (Town/Estate)">
        <select id="productSelect">
            <option value="">-- Choose Product --</option>
            <option value="Body Cream">Body Cream - 700</option>
            <option value="Sanitary Pads">Sanitary Pads - 300</option>
            <option value="Kojic Soap">Kojic Soap - 300</option>
            <option value="Lip Balm">Lip Balm - 250</option>
        </select>
        <p><input type="checkbox" id="carrierBag"> Add Carrier Bag (KES 20.00)</p>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">Order via WhatsApp ✅</button>
    </div>
</div>

<script>
    function selectProduct(name, price) {
        document.getElementById('productSelect').value = name;
        document.getElementById('checkout').scrollIntoView({behavior: 'smooth'});
    }

    function sendWhatsApp() {
        const name = document.getElementById('name').value;
        const loc = document.getElementById('location').value;
        const prod = document.getElementById('productSelect').value;
        const bag = document.getElementById('carrierBag').checked;
        const phone = "254119645924";

        if (!name || !loc || !prod) {
            alert("Please fill in your name, location, and select a product.");
            return;
        }

        let total = (prod === "Body Cream" ? 700 : (prod === "Lip Balm" ? 250 : 300));
        if(bag) total += 20;

        const text = `*NEW ORDER*%0A*Name:* ${name}%0A*Location:* ${loc}%0A*Product:* ${prod}%0A*Carrier Bag:* ${bag ? 'Yes' : 'No'}%0A*Total:* KES ${total}`;
        window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    }
</script>

</body>
</html>
